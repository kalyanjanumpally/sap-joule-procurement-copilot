name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax-check all plugin source files
        working-directory: cds-plugin-llm
        run: |
          for f in lib/*.js lib/providers/*.js; do
            node --check "$f"
          done
          for f in test/*.js; do node --check "$f"; done
          for f in ../scripts/*.js; do node --check "$f"; done

      - name: Unit tests (base LLMService, retry helper, GenAI Hub OAuth flow)
        working-directory: cds-plugin-llm
        # explicit file glob rather than `test/` — Node 22 changed directory
        # resolution and treats a bare directory name as a require() target
        run: node --test test/*.js

      - name: End-to-end verification against mock AI Core
        run: node scripts/verify-genai-hub.js
